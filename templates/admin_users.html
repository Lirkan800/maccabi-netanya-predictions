{% extends "base.html" %}

{% block title %}ניהול משתתפים{% endblock %}

{% block content %}

<div class="card">
    <h2>👥 ניהול משתתפים</h2>

    <table>
        <tr>
            <th>משתתף</th>
            <th>נקודות</th>
            <th>רצף</th>
            <th>מחיקה</th>
            <th>עדכון ניקוד</th>
        </tr>

        {% for player, data in leaderboard %}
        <tr>
            <td>{{ player }}</td>
            <td>{{ data.points }}</td>
            <td>{{ data.streak }}</td>

            <td>
                <form method="POST" onsubmit="return confirm('בטוח למחוק את {{ player }}?');">
                    <input type="hidden" name="player_to_delete" value="{{ player }}">
                    <button class="danger" type="submit" name="action" value="delete">מחק</button>
                </form>
            </td>
            <td>
    <form method="POST">
        <input type="hidden" name="player_name" value="{{ player }}">
        <input type="number" name="points_change" value="0">

        <button type="submit" name="action" value="adjust_points">
            עדכן ניקוד
        </button>
    </form>
</td>
        </tr>
        {% endfor %}
    </table>

    <br>

    <form method="POST" onsubmit="return confirm('בטוח לאפס את כל הטבלה?');">
        <button class="danger" type="submit" name="action" value="reset">
            אפס טבלה
        </button>
    </form>
</div>

{% endblock %}
