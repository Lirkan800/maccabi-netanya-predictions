<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ניחושי מכבי נתניה{% endblock %}</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        .header {
            background: linear-gradient(135deg, #ffd400, #111);
            color: #111;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
        }

        .header p {
            margin-top: 10px;
            font-weight: bold;
        }

        .navbar {
            background: #1a1a1a;
            padding: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            border-bottom: 2px solid #ffd400;
        }

        .navbar a {
            text-decoration: none;
            background: #222;
            color: #ffd400;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: bold;
        }

        .navbar a:hover {
            background: #ffd400;
            color: #111;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 25px;
        }

        .card {
            background: #1d1d1d;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(255,212,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #222;
            overflow: hidden;
            border-radius: 12px;
        }

        th {
            background: #ffd400;
            color: #111;
        }

        td, th {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        button {
            background: #ffd400;
            color: #111;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        .danger {
            background: #dc3545;
            color: white;
        }

        input, select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin: 5px 0;
            width: 100%;
            max-width: 350px;
        }

        .success {
            color: #4caf50;
            font-weight: bold;
        }

        .error {
            color: #ff6b6b;
            font-weight: bold;
        }

        @media (max-width: 768px) {

            .navbar {
                flex-direction: column;
            }

            .navbar a {
                text-align: center;
            }

            table {
                font-size: 14px;
            }
        }
    </style>

</head>

<body>

<div class="header">
    <h1>💛🖤 האימפריה עוד תחזור 💛🖤</h1>
    <p>טבלת הניחושים של המשפחה</p>
</div>

<div class="navbar">
    <a href="/">🏆 טבלת דירוג</a>
    <a href="/join">➕ הצטרפות</a>
    <a href="/rules">📜 חוקים</a>
    <a href="/admin">🔐 Admin</a>

    {% if is_admin %}
        <a href="/admin/users">👥 ניהול משתתפים</a>
        <a href="/admin/test">🧪 Test Mode</a>
    {% endif %}
</div>

<div class="container">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
