{% extends "base.html" %}

{% block title %}
התחברות
{% endblock %}

{% block content %}

<div class="card">

    <h2>🔑 התחברות משתתף</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <p>שם משתתף</p>
        <input type="text" name="username">

        <p>סיסמה</p>
        <input type="password" name="password">

        <br><br>

        <button type="submit">
            התחבר
        </button>

    </form>

</div>

{% endblock %}
